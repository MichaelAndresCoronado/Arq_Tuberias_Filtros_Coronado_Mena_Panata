services: 
  mysql:
    image: mysql:8.0
    container_name: api_libros_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: biblioteca
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
volumes:
  mysql_data: